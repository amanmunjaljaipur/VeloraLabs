[mcp_servers.velora-newsletter]
command = "npx"
args = ["tsx", "mcp/newsletter-email/src/server.ts"]
enabled = true
startup_timeout_sec = 45
env = {
  VELORA_API_URL = "https://velora-labs-gamma.vercel.app",
  NEWSLETTER_MCP_API_KEY = "${NEWSLETTER_MCP_API_KEY}",
  NEWS_PUBLISH_API_KEY = "${NEWS_PUBLISH_API_KEY}"
}